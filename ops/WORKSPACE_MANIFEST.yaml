source_precedence:
  - live_production
  - primary_repository_default_branch
  - project_brain
  - approved_canonical_artifact
  - file_library
  - local_mirror
  - chat_memory

rules:
  - Never treat a local path, uploaded copy, generated export, or chat recollection as authoritative when a higher-precedence source is available.
  - Production observations describe deployed state; repository sources describe intended implementation. Record conflicts explicitly.
  - Every implementation task must declare its target project, authoritative repository, branch, and write-back destination.
  - Every artifact task must identify the canonical source file and the assumptions or decision ledger it consumes.
  - Unknown or inaccessible sources must be marked UNVERIFIABLE, never inferred.

